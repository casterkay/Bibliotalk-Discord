[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bt_cli"
version = "0.1.0"
description = "Bibliotalk unified operator CLI"
requires-python = ">=3.11"
dependencies = [
  "bt_common>=0.1.0",
  "discord_service>=0.1.0",
  "ingestion_service>=0.1.0",
  "memory_page_service>=0.1.0",
  "typer>=0.12.3",
  "rich>=13.9.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "ruff>=0.6.9",
]

[project.scripts]
bibliotalk = "bt_cli.main:main"

[tool.setuptools]
packages = ["bt_cli"]

[tool.setuptools.package-dir]
"bt_cli" = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]

[tool.uv.sources]
bt-common = { workspace = true }
discord-service = { workspace = true }
ingestion-service = { workspace = true }
memory-page-service = { workspace = true }
