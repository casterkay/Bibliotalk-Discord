[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bt_common"
version = "0.1.0"
description = "Bibliotalk shared Python library"
requires-python = ">=3.11"
dependencies = [
  "evermemos>=0.3.13",
  "httpx>=0.27.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.23.8",
]

[tool.setuptools]
packages = ["bt_common"]

[tool.setuptools.package-dir]
"bt_common" = "src"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
