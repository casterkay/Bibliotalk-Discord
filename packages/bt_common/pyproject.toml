[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bt_common"
version = "0.1.0"
description = "Bibliotalk shared Python library"
requires-python = ">=3.11"
dependencies = [
  "aiosqlite>=0.20.0",
  "evermemos>=0.3.13",
  "greenlet>=3.1.1",
  "httpx>=0.27.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "python-dotenv>=1.0.1",
  "SQLAlchemy>=2.0.36",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.23.8",
  "ruff>=0.6.9",
]

[tool.setuptools]
packages = ["bt_common"]

[tool.setuptools.package-dir]
"bt_common" = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]
